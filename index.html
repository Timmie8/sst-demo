<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST Interactive Demo</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  .demo-container {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
  }

  .demo-container img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Overlay vakjes */
  .overlay {
    position: absolute;
    background: rgba(255, 255, 255, 0.9);
    border: 3px solid #ff0000;
    border-radius: 8px;
    padding: 10px;
    max-width: 300px;
    /* Schaal mee met container */
    transform-origin: top left;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  .controls button {
    padding: 10px 20px;
    margin: 0 5px;
    border: none;
    background: #1e3d59;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="demo-container">
  <!-- Hier komt je screenshot -->
  <img id="demoImage" src="images/home.png" alt="SST Demo">

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- Navigatie -->
  <div class="controls">
    <button onclick="prevStep()">Previous</button>
    <button onclick="nextStep()">Next</button>
  </div>
</div>

<script>
// Hier definieer je je stappen en screenshots
const steps = [
  {
    img: "images/home.png",
    text: "Welcome to SST! Change your language here.",
    topPct: 3,
    leftPct: 2
  },
  {
    img: "images/membership.png",
    text: "Click 'Start Your Membership' to pay via PayPal.",
    topPct: 12,
    leftPct: 2
  },
  {
    img: "images/members.png",
    text: "Already a member? Go to the Members area here.",
    topPct: 10,
    leftPct: 2
  },
  {
    img: "images/videos.png",
    text: "Read pages and watch videos here.",
    topPct: 10,
    leftPct: 2
  },
  {
    img: "images/notifications.png",
    text: "Enable live notifications to stay updated.",
    topPct: 10,
    leftPct: 2
  },
  {
    img: "images/morningcall.png",
    text: "Check the Morning Call page for info.",
    topPct: 10,
    leftPct: 2
  },
  {
    img: "images/buysell.png",
    text: "Daily Buy/Sell tips appear here.",
    topPct: 10,
    leftPct: 2
  },
  {
    img: "images/tatools.png",
    text: "Find all free TA Tools / Apps here.",
    topPct: 10,
    leftPct: 2
  }
];

let currentStep = 0;

const demoImage = document.getElementById("demoImage");
const overlay = document.getElementById("overlay");
const container = document.querySelector(".demo-container");

// Functie om overlay te positioneren in % van container
function positionOverlay(step) {
  overlay.textContent = step.text;
  overlay.style.top = (container.clientHeight * step.topPct / 100) + "px";
  overlay.style.left = (container.clientWidth * step.leftPct / 100) + "px";
}

// Toon stap
function showStep(stepIndex) {
  const step = steps[stepIndex];
  demoImage.src = step.img;
  // Even wachten tot afbeelding geladen is voor juiste hoogte
  demoImage.onload = () => {
    positionOverlay(step);
  }
}

// Navigatie
function nextStep() {
  if (currentStep < steps.length - 1) currentStep++;
  showStep(currentStep);
}

function prevStep() {
  if (currentStep > 0) currentStep--;
  showStep(currentStep);
}

// Start demo
showStep(currentStep);

// Responsive: herpositioneer overlay bij venster resize
window.addEventListener("resize", () => showStep(currentStep));
</script>

</body>
</html>
